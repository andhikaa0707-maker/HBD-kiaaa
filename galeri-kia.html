  <link rel="icon" href="foto/favicon.png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue1: #6495ED; --blue2: #00008B; --blue3: #B8D4FF; --blue4: #E8F1FF; }
    body { font-family: 'Nunito', sans-serif; background: var(--blue4); min-height: 100vh; padding: 3rem 1.5rem; }
    .wrap { max-width: 960px; margin: 0 auto; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      color: var(--blue1); text-decoration: none; font-size: 0.875rem;
      font-weight: 600; margin-bottom: 2rem; transition: gap 0.2s;
    }
    .back-btn:hover { gap: 0.75rem; }
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      color: var(--blue2); margin-bottom: 0.5rem;
    }
    .page-sub { color: #4a6fa5; margin-bottom: 3rem; font-size: 1rem; }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }
    .gallery-item {
      border-radius: 16px; overflow: hidden;
      aspect-ratio: 3/4; background: white;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(100,149,237,0.12);
      transition: transform 0.25s, box-shadow 0.25s;
      cursor: pointer;
    }
    .gallery-item:hover { transform: translateY(-5px); box-shadow: 0 12px 36px rgba(100,149,237,0.22); }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .gallery-placeholder {
      display: flex; flex-direction: column; align-items: center;
      gap: 0.75rem; color: var(--blue1); font-size: 0.8rem; font-weight: 600;
    }

    /* Lightbox */
    .lightbox {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.9);
      display: none; align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 90vw; max-height: 90vh;
      border-radius: 12px; object-fit: contain;
    }
    .lightbox-close {
      position: absolute; top: 1.5rem; right: 1.5rem;
      background: rgba(255,255,255,0.15); border: none;
      color: white; width: 44px; height: 44px;
      border-radius: 50%; font-size: 1.2rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    @media (max-width: 500px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

  </button>

<script src="js/music.js"></script>
<script>
function openLightbox(src) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lightbox-img');
  img.src = src;
  lb.classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
</script>
